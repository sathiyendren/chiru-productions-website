<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#0A0A0F"/>
  
  <!-- Film strip frame -->
  <rect x="2" y="2" width="28" height="28" fill="none" stroke="#C9933A" stroke-width="1"/>
  
  <!-- Film perforations -->
  <g fill="#C9933A">
    <!-- Left perforations -->
    <rect x="4" y="4" width="2" height="2"/>
    <rect x="4" y="8" width="2" height="2"/>
    <rect x="4" y="12" width="2" height="2"/>
    <rect x="4" y="16" width="2" height="2"/>
    <rect x="4" y="20" width="2" height="2"/>
    <rect x="4" y="24" width="2" height="2"/>
    
    <!-- Right perforations -->
    <rect x="26" y="4" width="2" height="2"/>
    <rect x="26" y="8" width="2" height="2"/>
    <rect x="26" y="12" width="2" height="2"/>
    <rect x="26" y="16" width="2" height="2"/>
    <rect x="26" y="20" width="2" height="2"/>
    <rect x="26" y="24" width="2" height="2"/>
  </g>
  
  <!-- Center content - CP monogram -->
  <g fill="#E8E4DC" font-family="Bebas Neue, Arial Black, sans-serif" font-weight="bold">
    <text x="16" y="20" font-size="14" text-anchor="middle">CP</text>
  </g>
  
  <!-- Decorative film strip element -->
  <rect x="8" y="26" width="16" height="1" fill="#C0152A"/>
</svg>
